# 本地HTTP(S)代理服务器的端口
# port: 7890

# 本地SOCKS5代理服务器端口
# socks-port: 7891

# Linux和macOS的透明代理服务器端口
# redir-port: 7892

# HTTP(S)和SOCKS5服务器使用同一端口
mixed-port: 7890

# 本地SOCKS5/HTTP(S)服务器的身份验证
# authentication:
#  - "user1:pass1"
#  - "user2:pass2"

# 如果设置为true，允许从其他LAN IP地址连接到本地终端服务器
allow-lan: false

# bind-address仅在“allow lan”为“true”时生效
# '*': bind all IP addresses
# 192.168.122.11: bind a single IPv4 address
# "[aaaa::a8aa:ff:fe09:57d8]": bind a single IPv6 address
bind-address: '*'

# Clash的工作模式
mode: rule

# 默认情况下，Clash将日志输出到STDOUTT
# info / warning / error / debug / silent
log-level: info

# 如果设置为false，解析程序不会将主机名转换为IPv6地址
ipv6: false

# RESTful web API监听地址
external-controller: 127.0.0.1:9090

# 指向配置目录的相对路径或指向放置某些静态web资源的目录的绝对路径，Clash core将在“http://{{external-controller}}/ui”上为其提供服务
# external-ui: folder

# RESTful API的密码（可选）
# 通过指定HTTP头“Authorization:bearner${secret}”进行身份验证
# 如果RESTful API正在侦听0.0.0.0，请设置密码
# secret: ""

# 出站接口名称
# interface-name: en0

# 仅当“dns.enhanced-mode”为“redir-host”时运行
# 支持通配符主机名（e.g. *.clash.dev, *.foo.*.example.com）
# 非通配符域名的优先级高于通配符域名
# e.g. foo.example.com > *.example.com > .example.com
# P.S. +.foo.com = .foo.com = foo.com
hosts:
  'mtalk.google.com': 108.177.125.188
  't.cn': 203.107.55.116
  # '*.clash.dev': 127.0.0.1
  # '.dev': 127.0.0.1
  # 'alpha.clash.dev': '::1'

# DNS服务器设置
# 此部分是可选的，当不存在时，DNS服务器将被禁用
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false # 如果为false，则响应AAAA的结果将为空

  # default-nameserver将被用于解析下面DNS nameserver的主机名
  # 仅可指定IP地址
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: redir-host # or fake-ip
  fake-ip-range: 198.18.0.1/16 # Fake IP地址池CIDR
  
  # 此列表中的主机名不会用fake-ip解析
  # 对这些域名将会用真实IP地址来响应
  # fake-ip-filter:
  #   - '*.lan'
  #   - localhost.ptlogin2.qq.com
  
  # 支持UDP，TCP，DoT，DoH，可以指定要连接的端口
  # 所有DNS请求都直接发送到nameserver，不经过代理，Clash使用第一个响应的结果解析DNS
  nameserver:
    - https://doh.pub/dns-query
    - https://223.5.5.5/dns-query
    # - 114.114.114.114 # default value
    # - 8.8.8.8 # default value
    # - tls://dns.rubyfish.cn:853 # DNS over TLS
    # - https://1.1.1.1/dns-query # DNS over HTTPS

  # 当存在“fallback”时，DNS服务器将与“nameservers”中的服务器一起向该部分中的服务器发送并发请求，当GEOIP不是“CN”时，使用fallback的结果
  fallback:
    - tls://1.1.1.1:853
    - tls://dns.google

  # 如果使用“nameservers”中的服务器解析的IP地址位于下面指定的子网中，则这些地址将被视为无效，而是使用“fallback”服务器的结果
  # 当“fallback filter.geoip”为true且IP地址的geoip为“CN”时，使用“nameserver”中的服务器解析的IP地址
  # 如果“fallback-filter.geoip”为false，则未匹配“fallback-filter.ipcidr”时，将始终使用“nameserver”中服务器解析的结果
  # 这是针对DNS污染的对策
  fallback-filter:
    geoip: true
    ipcidr:
      # - 240.0.0.0/4
